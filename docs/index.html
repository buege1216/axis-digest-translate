<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軸心閱讀 Axis Reader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:Georgia,serif;color:#2c2c2a;min-height:100vh}
a{text-decoration:none;color:inherit}
.hd{background:#1a1a18;padding:24px 32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.hd h1{color:#f1efe8;font-size:22px;font-weight:400;flex:1}
.hd-stats{font-family:Arial,sans-serif;font-size:12px;color:#888780}
.search-wrap{display:flex;gap:8px;width:100%}
.search{flex:1;padding:8px 14px;border:none;border-radius:20px;font-size:14px;outline:none;background:#2c2c2a;color:#f1efe8}
.search::placeholder{color:#5f5e5a}
.tabs{background:#2c2c2a;display:flex;padding:0 32px}
.tab{padding:12px 20px;font-family:Arial,sans-serif;font-size:13px;color:#888780;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#f1efe8;border-bottom-color:#f1efe8}
.layout{display:flex;min-height:calc(100vh - 140px)}
.sidebar{width:240px;flex-shrink:0;background:#fff;border-right:1px solid #e8e6e0;overflow-y:auto;max-height:calc(100vh - 140px);position:sticky;top:0}
.sidebar-section{border-bottom:1px solid #f1efe8}
.sidebar-item{padding:10px 16px;font-family:Arial,sans-serif;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sidebar-item:hover{background:#f5f4f0}
.sidebar-item.active{background:#1a1a18;color:#f1efe8}
.sidebar-sub{padding:6px 16px 6px 28px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;font-family:Arial,sans-serif}
.sidebar-sub:hover{background:#f5f4f0}
.sidebar-sub.active{color:#1a1a18;font-weight:bold}
.count{font-family:Arial,sans-serif;font-size:12px;color:#b4b2a9}
.content{flex:1;padding:20px 24px;overflow-y:auto}
.content-header{margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.content-title{font-size:16px;font-weight:400}
.content-count{font-family:Arial,sans-serif;font-size:13px;color:#888780}
.art-item{background:#fff;margin-bottom:8px;border-radius:2px;border-left:3px solid #1a1a18;cursor:pointer}
.art-item:hover{border-left-color:#888780}
.art-item.read{border-left-color:#d3d1c7;opacity:.7}
.art-header{padding:14px 18px}
.art-title{font-size:15px;line-height:1.4;margin-bottom:6px}
.art-meta{font-family:Arial,sans-serif;font-size:12px;color:#888780;display:flex;gap:12px;flex-wrap:wrap}
.art-cat{background:#f1efe8;padding:2px 8px;border-radius:10px;font-size:11px;color:#444}
.reader{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto}
.reader.open{display:block}
.reader-hd{background:#1a1a18;padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.reader-back{color:#888780;font-family:Arial,sans-serif;font-size:13px;cursor:pointer;flex-shrink:0}
.reader-back:hover{color:#f1efe8}
.reader-title{color:#f1efe8;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reader-link{color:#888780;font-family:Arial,sans-serif;font-size:12px;flex-shrink:0}
.reader-link:hover{color:#f1efe8}
.reader-body{max-width:680px;margin:0 auto;padding:32px 24px}
.reader-meta{font-family:Arial,sans-serif;font-size:13px;color:#888780;margin-bottom:24px;padding-bottom:16px;border-top:1px solid #f1efe8;padding-top:16px}
.reader-content{font-size:16px;line-height:1.9;color:#2c2c2a}
.reader-content img{max-width:100%;height:auto;margin:16px 0;display:block;border-radius:2px}
.reader-content p{margin-bottom:1em}
.img-caption{font-size:13px;color:#888780;font-family:Arial,sans-serif;margin:-8px 0 16px}
.reader-nav{display:flex;justify-content:space-between;align-items:stretch;padding:24px 0;margin-top:32px;border-top:1px solid #f1efe8;gap:12px}
.reader-nav-btn{flex:1;padding:12px 16px;border:1px solid #d3d1c7;border-radius:2px;cursor:pointer;background:#fff;font-family:Arial,sans-serif;font-size:13px;color:#1a1a18;max-width:48%}
.reader-nav-btn:hover{background:#f5f4f0}
.reader-nav-btn.disabled{color:#b4b2a9;cursor:default;border-color:#f1efe8;background:#fafaf8}
.reader-nav-label{font-size:11px;color:#888780;margin-bottom:6px;letter-spacing:.1em;text-transform:uppercase}
.reader-nav-title{font-size:13px;line-height:1.4}
.loading{text-align:center;padding:48px;color:#888780;font-family:Arial,sans-serif}
@media(max-width:600px){
  .sidebar{width:100%;max-height:200px;position:relative}
  .layout{flex-direction:column}
  .hd{padding:16px}
  .tabs{padding:0 16px}
  .content{padding:12px}
}
</style>
</head>
<body>

<div class="hd">
  <h1>軸心閱讀 Axis Reader</h1>
  <div class="hd-stats" id="hd-stats">載入中...</div>
  <div class="search-wrap">
    <input class="search" type="text" placeholder="搜尋文章標題..." oninput="onSearch(this.value)">
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchView('date')">📅 依日期</div>
  <div class="tab" onclick="switchView('cat')">🏷️ 依類別</div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="content-header">
      <div class="content-title" id="content-title">請從左側選擇</div>
      <div class="content-count" id="content-count"></div>
    </div>
    <div id="article-list"><div class="loading">← 從左側選擇年份或類別開始閱讀</div></div>
  </div>
</div>

<div class="reader" id="reader">
  <div class="reader-hd">
    <div class="reader-back" onclick="closeReader()">← 返回</div>
    <div class="reader-title" id="reader-title"></div>
    <a class="reader-link" id="reader-link" href="#" target="_blank">原文 ↗</a>
  </div>
  <div class="reader-body">
    <div class="reader-meta" id="reader-meta"></div>
    <div class="reader-content" id="reader-content"></div>
  </div>
</div>

<script>
let allIndex = [];
let currentView = 'date';
let currentKey = '';
let monthCache = {};
let searchQuery = '';
let readSet = new Set(JSON.parse(localStorage.getItem('read') || '[]'));
let currentList = [];   // 目前瀏覽的文章清單（用於上下篇）
let currentCatFilter = '';

async function init() {
  try {
    const r = await fetch('data/index.json?t=' + Date.now());
    const data = await r.json();
    allIndex = data.articles || [];
    document.getElementById('hd-stats').textContent =
      '共 ' + data.total + ' 篇已翻譯　·　' + data.updated_at;
    renderSidebar();
  } catch(e) {
    document.getElementById('hd-stats').textContent = '載入失敗';
  }
}

function switchView(v) {
  currentView = v;
  currentKey = '';
  currentList = [];
  currentCatFilter = '';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (v==='date'?0:1)));
  renderSidebar();
  document.getElementById('article-list').innerHTML = '<div class="loading">← 從左側選擇開始閱讀</div>';
  document.getElementById('content-title').textContent = '請從左側選擇';
  document.getElementById('content-count').textContent = '';
}

function renderSidebar() {
  document.getElementById('sidebar').innerHTML =
    currentView === 'date' ? buildDateSidebar() : buildCatSidebar();
}

function buildDateSidebar() {
  const byYear = {};
  allIndex.forEach(a => {
    const ym = a.ym || 'unknown';
    const y = ym.slice(0, 4);
    const m = ym.slice(5, 7);
    if (!byYear[y]) byYear[y] = {};
    if (!byYear[y][m]) byYear[y][m] = 0;
    byYear[y][m]++;
  });
  const years = Object.keys(byYear).sort((a,b) => b-a);
  let html = '';
  years.forEach(y => {
    const yTotal = Object.values(byYear[y]).reduce((s,n) => s+n, 0);
    html += '<div class="sidebar-section">';
    html += '<div class="sidebar-item" onclick="toggleEl(\'y-' + y + '\')">';
    html += '<span>📅 ' + y + ' 年</span><span class="count">' + yTotal + '</span></div>';
    html += '<div id="y-' + y + '" style="display:none">';
    Object.keys(byYear[y]).sort((a,b) => b-a).forEach(m => {
      const key = y + '-' + m;
      html += '<div class="sidebar-sub" onclick="selectDateKey(\'' + key + '\')" id="dk-' + key + '">';
      html += '<span>' + y + '/' + m + '</span><span class="count">' + byYear[y][m] + '</span></div>';
    });
    html += '</div></div>';
  });
  return html;
}

function buildCatSidebar() {
  const byCat = {};
  allIndex.forEach(a => {
    const cat = a.cat_label || '其他';
    const ym = (a.ym && a.ym !== 'unknown') ? a.ym : null;
    if (!byCat[cat]) byCat[cat] = {};
    const key = ym || 'unknown';
    if (!byCat[cat][key]) byCat[cat][key] = 0;
    byCat[cat][key]++;
  });

  const cats = Object.keys(byCat).sort();
  let html = '';
  cats.forEach((cat, idx) => {
    const catId = 'ci-' + idx;
    const total = Object.values(byCat[cat]).reduce((s,n) => s+n, 0);
    html += '<div class="sidebar-section">';
    html += '<div class="sidebar-item" onclick="toggleEl(\'' + catId + '\')">';
    html += '<span>🏷️ ' + esc2(cat) + '</span><span class="count">' + total + '</span></div>';
    html += '<div id="' + catId + '" style="display:none">';
    Object.keys(byCat[cat]).sort((a,b) => b > a ? -1 : 1).forEach(ym => {
      const safeKey = 'cat|' + idx + '|' + ym;
      html += '<div class="sidebar-sub" onclick="selectCatKey(' + idx + ',\'' + ym + '\')">';
      html += '<span>' + (ym === 'unknown' ? '日期不明' : ym) + '</span>';
      html += '<span class="count">' + byCat[cat][ym] + '</span></div>';
    });
    html += '</div></div>';
  });
  return html;
}

function toggleEl(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function selectDateKey(ym) {
  currentKey = ym;
  currentCatFilter = '';
  document.querySelectorAll('.sidebar-sub').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('dk-' + ym);
  if (el) el.classList.add('active');

  document.getElementById('article-list').innerHTML = '<div class="loading">載入中...</div>';

  const articles = await loadMonth(ym);
  if (!articles) return;

  let filtered = articles;
  if (searchQuery) filtered = filtered.filter(a => (a.title||'').toLowerCase().includes(searchQuery));

  currentList = filtered;
  document.getElementById('content-title').textContent = ym;
  document.getElementById('content-count').textContent = filtered.length + ' 篇';
  document.getElementById('article-list').innerHTML = filtered.map(artHTML).join('') || '<div class="loading">沒有文章</div>';
}

async function selectCatKey(catIdx, ym) {
  currentCatFilter = catIdx;
  currentKey = 'cat|' + catIdx + '|' + ym;

  document.getElementById('article-list').innerHTML = '<div class="loading">載入中...</div>';

  // 取得該類別的名稱
  const cats = [...new Set(allIndex.map(a => a.cat_label || '其他'))].sort();
  const catName = cats[catIdx] || '其他';

  // 載入該月份
  let articles = [];
  if (ym !== 'unknown') {
    const loaded = await loadMonth(ym);
    if (loaded) articles = loaded.filter(a => (a.cat_label || '其他') === catName);
  } else {
    // 日期不明：從 index 找出屬於這個類別且 ym 是 unknown 的
    articles = allIndex.filter(a => (a.cat_label || '其他') === catName && (!a.ym || a.ym === 'unknown'));
  }

  if (searchQuery) articles = articles.filter(a => (a.title||'').toLowerCase().includes(searchQuery));

  currentList = articles;
  document.getElementById('content-title').textContent = catName + ' · ' + (ym === 'unknown' ? '日期不明' : ym);
  document.getElementById('content-count').textContent = articles.length + ' 篇';
  document.getElementById('article-list').innerHTML = articles.map(artHTML).join('') || '<div class="loading">沒有文章</div>';
}

async function loadMonth(ym) {
  if (monthCache[ym]) return monthCache[ym];
  try {
    const r = await fetch('data/' + ym + '.json?t=' + Date.now());
    if (!r.ok) throw new Error('not found');
    const data = await r.json();
    monthCache[ym] = data;
    return data;
  } catch(e) {
    document.getElementById('article-list').innerHTML = '<div class="loading">載入失敗</div>';
    return null;
  }
}

function artHTML(a) {
  const isRead = readSet.has(a.id);
  return '<div class="art-item' + (isRead?' read':'') + '" onclick="openReader(' + a.id + ')">' +
    '<div class="art-header">' +
    '<div class="art-title">' + esc2(a.title||'（無標題）') + '</div>' +
    '<div class="art-meta">' +
    '<span>' + (a.published||'') + '</span>' +
    (a.cat_label ? '<span class="art-cat">' + esc2(a.cat_label) + '</span>' : '') +
    (isRead ? '<span style="color:#b4b2a9">✓ 已讀</span>' : '') +
    '</div></div></div>';
}

async function openReader(id) {
  const idx = allIndex.find(a => a.id === id);
  if (!idx) return;
  const ym = idx.ym;

  let art = null;
  if (ym && ym !== 'unknown') {
    const articles = await loadMonth(ym);
    if (articles) art = articles.find(a => a.id === id);
  }
  if (!art) art = idx;

  document.getElementById('reader-title').textContent = art.title || '';
  document.getElementById('reader-link').href = art.url || '#';
  document.getElementById('reader-meta').textContent =
    (art.published||'') + (art.cat_label ? '　·　' + art.cat_label : '');

  let content = art.translation || '（翻譯尚未生成）';
  content = content.replace(/\[([^\]]*)\]\((https?:\/\/[^)]+)\)/g,
    '<a href="$2" target="_blank" style="color:#1a1a18;border-bottom:1px solid #d3d1c7;">$1</a>');
  content = content.replace(/!\[([^\]]*)\]\((https?:\/\/[^)]+)\)/g, function(m, alt, url) {
    if (url.includes('wp-content/uploads')) {
      let h = '<img src="' + url + '">';
      if (alt && !alt.startsWith('Image ') && alt !== 'Image') {
        h += '<p class="img-caption">' + esc2(alt) + '</p>';
      }
      return h;
    }
    return '';
  });
  content = content.replace(/!\[[^\]]*\]/g, '');
  content = content.split('\n').map(l => l.trim() ? '<p>' + l + '</p>' : '').join('');

  // 上下篇
  const pos = currentList.findIndex(a => a.id === id);
  const prevArt = pos > 0 ? currentList[pos - 1] : null;
  const nextArt = pos < currentList.length - 1 ? currentList[pos + 1] : null;

  const navBtn = (a, dir) => a
    ? '<div class="reader-nav-btn" onclick="openReader(' + a.id + ')" style="' + (dir==='next'?'text-align:right':'') + '">' +
      '<div class="reader-nav-label">' + (dir==='prev'?'← 上一篇':'下一篇 →') + '</div>' +
      '<div class="reader-nav-title">' + esc2(a.title||'') + '</div></div>'
    : '<div class="reader-nav-btn disabled" style="' + (dir==='next'?'text-align:right':'') + '">' +
      '<div class="reader-nav-label">' + (dir==='prev'?'← 上一篇':'下一篇 →') + '</div>' +
      '<div class="reader-nav-title">' + (dir==='prev'?'已是第一篇':'已是最後一篇') + '</div></div>';

  document.getElementById('reader-content').innerHTML =
    content + '<div class="reader-nav">' + navBtn(prevArt,'prev') + navBtn(nextArt,'next') + '</div>';

  document.getElementById('reader').classList.add('open');
  document.body.style.overflow = 'hidden';

  readSet.add(id);
  localStorage.setItem('read', JSON.stringify([...readSet]));
  if (document.getElementById('article-list').innerHTML) {
    document.getElementById('article-list').innerHTML =
      currentList.map(artHTML).join('');
  }
}

function closeReader() {
  document.getElementById('reader').classList.remove('open');
  document.body.style.overflow = '';
}

function onSearch(v) {
  searchQuery = v.toLowerCase();
  if (currentKey) {
    if (currentKey.startsWith('cat|')) {
      const parts = currentKey.split('|');
      selectCatKey(parseInt(parts[1]), parts[2]);
    } else {
      selectDateKey(currentKey);
    }
  }
}

function esc2(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
